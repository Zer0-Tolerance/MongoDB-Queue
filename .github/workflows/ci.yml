name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Raku
        uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      - name: Install dependencies
        run: zef install --deps-only --/test .

      - name: Run tests
        env:
          TEST_WITH_MONGO: 1
        run: zef test .
